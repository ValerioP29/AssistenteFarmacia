<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Prodotti Senza Glutine</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" />
    <link rel="stylesheet" href="./assets/css/style.min.css?v=1.1.1" />
</head>
<body class="page-app page-celiachia loading">
    <div id="app" class="app-container">
        <app-header></app-header>
        <app-goback></app-goback>
        <app-body>

            <app-card>
                <div class="celiachia-hero">
                    <div class="celiachia-hero__icon"><i class="bi bi-flower1"></i></div>
                    <div>
                        <h1 class="celiachia-hero__title">Prodotti senza glutine</h1>
                        <p class="celiachia-hero__desc">Una selezione di prodotti adatti a celiaci e intolleranti al glutine.</p>
                    </div>
                </div>
            </app-card>

            <app-card>
                <div id="celiachia-list" class="grid-product">
                    <div class="text-center text-muted py-4 w-100">Caricamento prodotti...</div>
                </div>
            </app-card>

        </app-body>
        <app-footer></app-footer>
    </div>

    <script type="module" src="./assets/components/layout.js?v=1.1.1"></script>
    <script src="./assets/js/app.js?v=1.1.1"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script>
    document.addEventListener('appLoaded', () => {
        const pharmaId = dataStore?.pharma?.id;
        const list = document.getElementById('celiachia-list');

        const url = `${AppURLs.api.productSuggestions()}?pharma_id=${pharmaId}&related_tag=celiachia&limit=20`;

        appFetchWithToken(url, { method: 'GET' })
            .then((data) => {
                const products = data?.data?.products || data?.data?.items || data?.data || data?.products || [];
                
                if (!products.length) {
                    list.innerHTML = '<p class="text-center text-muted py-4">Nessun prodotto trovato.</p>';
                    return;
                }

                list.innerHTML = products.map((p) => {
                    const img = p.image?.src || p.image || AppURLs.api.base + '/uploads/images/placeholder-product.jpg';
                    const showDiscount = p.is_on_sale && Number(p.price_sale) < Number(p.price_regular);
                    return `
                    <div class="grid-item product-card">
                        <a class="product-name" href="${AppURLs.page.promotions() + '?id=' + p.id}">
                            <img src="${img}" alt="${escapeHtml(p.name)}" loading="lazy" />
                        </a>
                        <a class="product-name" href="${AppURLs.page.promotions() + '?id=' + p.id}">${escapeHtml(p.name)}</a>
                        <div class="product-prices">
                            ${showDiscount ? `<s>€${Number(p.price_regular).toFixed(2)}</s>` : ''}
                            <span class="price">€${Number(showDiscount ? p.price_sale : p.price_regular).toFixed(2)}</span>
                        </div>
                        <button type="button" class="btn btn-primary" aria-label="Aggiungi ${escapeHtml(p.name)} al carrello">
                            Aggiungi
                        </button>
                    </div>`;
                }).join('');
            })
            .catch(() => {
                list.innerHTML = '<p class="text-center text-muted py-4">Errore nel caricamento.</p>';
            });
    });
    </script>
</body>
</html>
